name: Deploy to GitHub Pages

# Publishes the static site (repository root) to GitHub Pages on every push to
# the default branch. In the repo: Settings → Pages → Build and deployment →
# Source: "GitHub Actions". Nothing to build — it's a plain static bundle.

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Stage only the runtime files so dev/config dirs (.claude, .github) are
      # never published to the live site.
      - name: Stage site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r libs _site/
          cp .nojekyll _site/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
